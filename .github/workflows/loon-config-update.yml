name: Update Loon Configuration

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-configuration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch the latest configuration
        run: |
          curl -f -o loon.lcf https://raw.githubusercontent.com/luestr/ProxyResource/main/Tool/Loon/Lcf/zh-CN/Loon_Advanced_Config_By_iKeLee.lcf
          cat loon.lcf

      - name: Modify the configuration
        run: |
          sed -i 's/PHICOMM_5G/Live_5G/g' loon.lcf
          sed -i 's/10.0.0.1/system/g' loon.lcf
          sed -i '/^\[Remote Rule\]$/a https://rule.kelee.one/Loon/WeChat.lsr, policy=DIRECT, tag=WeChat分流, enabled=true' loon.lcf
          sed -i '/^\[Mitm\]$/i https://raw.githubusercontent.com/Alex0510/Eric/master/surge/Module/qing.sgmodule, tag=qing, enabled=true\nhttps://kelee.one/Tool/Loon/Lpx/SevenCat_remove_ads.lpx, enabled=true\nhttps://kelee.one/Tool/Loon/Lpx/YouTube_remove_ads.lpx, enabled=true\nhttps://kelee.one/Tool/Loon/Lpx/Spotify_remove_ads.lpx, enabled=true\nhttps://kelee.one/Tool/Loon/Lpx/YouTubeSubtitlesTranslation.lpx, enabled=true\nhttps://kelee.one/Tool/Loon/Lpx/Spotify_lyrics_translation.lpx, enabled=true\nhttps://kelee.one/Tool/Loon/Lpx/Baidu_input_method_remove_ads.lpx, enabled=true\nhttps://kelee.one/Tool/Loon/Lpx/OraySunlogin_remove_ads.lpx, enabled=true\nhttps://kelee.one/Tool/Loon/Lpx/FleaMarket_remove_ads.lpx, enabled=true\nhttps://kelee.one/Tool/Loon/Lpx/MailMaster_remove_ads.lpx, tag=网易邮箱大师, enabled=true' loon.lcf
          cat loon.lcf

      - name: Check for changes and commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -n "$(git status --porcelain)" ]; then
            git add loon.lcf
            git commit -m "Updated loon.lcf"
            git push
          fi
